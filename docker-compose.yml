services:
  pgsql:
    image: postgres:16-alpine
    container_name: nhatduong_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: nhatduonglaravel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ""
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - pgsql_data:/var/lib/postgresql/data
    networks:
      - nhatduong_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nhatduong_app
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - nhatduong_network
    depends_on:
      pgsql:
        condition: service_healthy
    command: php-fpm

  nginx:
    image: nginx:alpine
    container_name: nhatduong_nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - nhatduong_network
    depends_on:
      - app

volumes:
  pgsql_data:
    driver: local

networks:
  nhatduong_network:
    driver: bridge
